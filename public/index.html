<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Receptionist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      padding: 32px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1a1a1a;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .header h1 span {
      color: #666;
      font-weight: 500;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border: 1px solid #333;
      background: #0a0a0a;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
      50% { opacity: 0.5; box-shadow: 0 0 0 6px rgba(255,255,255,0); }
    }

    /* Stats */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #1a1a1a;
      border-bottom: 1px solid #1a1a1a;
    }

    .stat-card {
      background: #000;
      padding: 28px 32px;
    }

    .stat-card .label {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -2px;
      color: #fff;
    }

    /* Main layout */
    .main {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 1px;
      background: #1a1a1a;
      height: calc(100vh - 185px);
    }

    /* Left panel */
    .left-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #000;
    }

    .panel-header {
      padding: 20px 32px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header .count {
      color: #333;
      font-weight: 600;
    }

    .call-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .call-item {
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .call-item:hover {
      background: #0a0a0a;
      border-color: #333;
    }

    .call-item.active-call {
      border-color: #fff;
      background: #0a0a0a;
      animation: borderPulse 2.5s infinite;
    }

    @keyframes borderPulse {
      0%, 100% { border-color: #fff; }
      50% { border-color: #333; }
    }

    .call-item .call-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .call-item .caller {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.3px;
    }

    .call-item .call-status {
      font-size: 10px;
      padding: 4px 12px;
      border-radius: 100px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .call-status.in-progress { background: #fff; color: #000; }
    .call-status.completed { background: #1a1a1a; color: #666; }
    .call-status.failed { background: #1a1a1a; color: #444; }
    .call-status.ringing { background: #333; color: #fff; }

    .call-item .call-meta {
      font-size: 12px;
      color: #555;
      display: flex;
      gap: 16px;
      font-weight: 500;
    }

    .call-item .call-summary {
      font-size: 13px;
      color: #888;
      margin-top: 10px;
      line-height: 1.5;
      font-weight: 400;
    }

    .intent-badge {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: 100px;
      background: #1a1a1a;
      color: #888;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sentiment-positive { color: #fff !important; }
    .sentiment-negative { color: #555 !important; }
    .sentiment-neutral { color: #666 !important; }

    /* Right panel */
    .right-panel {
      display: flex;
      flex-direction: column;
      background: #000;
      overflow: hidden;
    }

    .activity-feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .activity-item {
      padding: 14px 18px;
      margin-bottom: 4px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
      border-left: 2px solid;
      font-weight: 400;
    }

    .activity-item.event-call-started {
      background: #0a0a0a;
      border-color: #fff;
    }

    .activity-item.event-call-ended {
      background: #0a0a0a;
      border-color: #555;
    }

    .activity-item.event-message-caller {
      background: #0a0a0a;
      border-color: #888;
    }

    .activity-item.event-message-ai {
      background: #0a0a0a;
      border-color: #333;
    }

    .activity-item .activity-time {
      font-size: 10px;
      color: #444;
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .activity-item .activity-text {
      color: #999;
    }

    .activity-item .activity-text strong {
      color: #fff;
      font-weight: 700;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #333;
      text-align: center;
      padding: 40px;
    }

    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 13px;
      line-height: 1.7;
      font-weight: 500;
      color: #444;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: #0a0a0a;
      border: 1px solid #222;
      border-radius: 12px;
      width: 620px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 32px;
    }

    .modal h2 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: -0.3px;
    }

    .modal .close-btn {
      background: none;
      border: 1px solid #333;
      color: #666;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .modal .close-btn:hover { color: #fff; border-color: #fff; }

    .modal .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .modal .detail-grid div {
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }

    .modal .detail-grid strong {
      color: #fff;
      font-weight: 700;
    }

    .modal .summary-box {
      background: #111;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #aaa;
      line-height: 1.6;
      border: 1px solid #1a1a1a;
    }

    .modal .summary-box strong { color: #fff; }

    .transcript { margin-top: 16px; }

    .transcript .msg {
      padding: 14px 18px;
      border-radius: 8px;
      margin-bottom: 6px;
      max-width: 85%;
      font-size: 14px;
      line-height: 1.6;
      font-weight: 400;
    }

    .transcript .msg.caller {
      background: #111;
      border: 1px solid #1a1a1a;
      margin-right: auto;
      color: #ccc;
    }

    .transcript .msg.assistant {
      background: #fff;
      color: #000;
      margin-left: auto;
      text-align: right;
      font-weight: 500;
    }

    .transcript .msg .msg-role {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: #555;
    }

    .transcript .msg.assistant .msg-role {
      color: #666;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    /* Selection */
    ::selection { background: #fff; color: #000; }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .right-panel { display: none; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .header { padding: 24px; }
      .header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AI RECEPTIONIST <span>/ DASHBOARD</span></h1>
    <span class="status-badge">
      <span class="status-dot"></span>
      Active 24/7
    </span>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="label">Active Calls</div>
      <div class="value" id="stat-active">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Today's Calls</div>
      <div class="value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Avg Duration</div>
      <div class="value" id="stat-duration">0s</div>
    </div>
    <div class="stat-card">
      <div class="label">Satisfaction</div>
      <div class="value" id="stat-sentiment">--</div>
    </div>
  </div>

  <div class="main">
    <div class="left-panel">
      <div class="panel-header">
        <span>Recent Calls</span>
        <span class="count" id="call-count"></span>
      </div>
      <div class="call-list" id="call-list">
        <div class="empty-state">
          <div class="icon">&#9679;</div>
          <p>No calls yet.<br>The AI receptionist is ready and waiting.</p>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="panel-header">Live Activity</div>
      <div class="activity-feed" id="activity-feed">
        <div class="empty-state">
          <div class="icon">&#9679;</div>
          <p>Waiting for activity...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Call Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>
        <span id="modal-title">Call Details</span>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </h2>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    let calls = [];

    // --- WebSocket ---
    let ws;
    function connectWS() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${location.host}`);
      ws.onopen = () => console.log('Dashboard connected');
      ws.onmessage = (event) => handleEvent(JSON.parse(event.data));
      ws.onclose = () => setTimeout(connectWS, 3000);
    }

    function handleEvent(msg) {
      switch (msg.event) {
        case 'init':
          if (msg.data.recentCalls) { calls = msg.data.recentCalls; renderCalls(); }
          if (msg.data.stats) updateStats(msg.data.stats);
          break;

        case 'call:started':
          addActivity('call-started', `New call from <strong>${msg.data.callerNumber}</strong>`);
          calls = [msg.data, ...calls.filter(c => c.call_sid !== msg.data.callSid)];
          normalizeCall(calls[0], msg.data);
          renderCalls();
          fetchStats();
          break;

        case 'call:status':
          updateCallInList(msg.data.callSid, { status: msg.data.status });
          addActivity('call-ended', `Call ${msg.data.callSid.slice(-6)} — <strong>${msg.data.status}</strong>`);
          renderCalls();
          fetchStats();
          break;

        case 'call:ended':
          updateCallInList(msg.data.callSid, {
            status: 'completed',
            summary: msg.data.summary,
            caller_intent: msg.data.intent,
            sentiment: msg.data.sentiment,
          });
          addActivity('call-ended',
            `Call ended — ${msg.data.summary || 'No summary'} <span class="intent-badge">${msg.data.intent || ''}</span>`
          );
          renderCalls();
          fetchStats();
          break;

        case 'message:new':
          const roleLabel = msg.data.role === 'user' ? 'Caller' : 'AI';
          const eventType = msg.data.role === 'user' ? 'message-caller' : 'message-ai';
          const preview = msg.data.content.length > 80 ? msg.data.content.slice(0, 80) + '...' : msg.data.content;
          addActivity(eventType, `<strong>${roleLabel}:</strong> ${preview}`);
          break;
      }
    }

    function normalizeCall(target, src) {
      target.call_sid = src.callSid || src.call_sid;
      target.caller_number = src.callerNumber || src.caller_number;
      target.status = src.status || 'in-progress';
      target.started_at = src.startedAt || src.started_at || new Date().toISOString();
    }

    function updateCallInList(callSid, updates) {
      const call = calls.find(c => c.call_sid === callSid || c.callSid === callSid);
      if (call) Object.assign(call, updates);
    }

    function renderCalls() {
      const list = document.getElementById('call-list');
      if (calls.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="icon">&#9679;</div><p>No calls yet.</p></div>';
        return;
      }

      document.getElementById('call-count').textContent = `${calls.length}`;

      list.innerHTML = calls.map(call => {
        const sid = call.call_sid || call.callSid;
        const status = call.status || 'unknown';
        const isActive = status === 'in-progress' || status === 'ringing';
        const time = call.started_at ? new Date(call.started_at).toLocaleTimeString() : '';
        const duration = call.duration_seconds ? `${call.duration_seconds}s` : '';

        return `
          <div class="call-item ${isActive ? 'active-call' : ''}" onclick="viewCall('${sid}')">
            <div class="call-top">
              <span class="caller">${call.caller_number || 'Unknown'}</span>
              <span class="call-status ${status}">${status}</span>
            </div>
            <div class="call-meta">
              <span>${time}</span>
              ${duration ? `<span>${duration}</span>` : ''}
              ${call.caller_intent ? `<span class="intent-badge">${call.caller_intent}</span>` : ''}
              ${call.sentiment ? `<span class="sentiment-${call.sentiment}">${call.sentiment}</span>` : ''}
            </div>
            ${call.summary ? `<div class="call-summary">${call.summary}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function addActivity(type, text) {
      const feed = document.getElementById('activity-feed');
      if (feed.querySelector('.empty-state')) feed.innerHTML = '';

      const item = document.createElement('div');
      item.className = `activity-item event-${type}`;
      item.innerHTML = `
        <div class="activity-time">${new Date().toLocaleTimeString()}</div>
        <div class="activity-text">${text}</div>
      `;
      feed.prepend(item);

      while (feed.children.length > 100) feed.removeChild(feed.lastChild);
    }

    function updateStats(stats) {
      document.getElementById('stat-active').textContent = stats.active_calls || 0;
      document.getElementById('stat-total').textContent = stats.total_calls || 0;

      const avgDur = stats.avg_duration ? Math.round(stats.avg_duration) : 0;
      document.getElementById('stat-duration').textContent = avgDur > 60
        ? `${Math.floor(avgDur / 60)}m ${avgDur % 60}s` : `${avgDur}s`;

      const total = (stats.positive_calls || 0) + (stats.negative_calls || 0) + (stats.neutral_calls || 0);
      if (total > 0) {
        const pct = Math.round(((stats.positive_calls || 0) / total) * 100);
        document.getElementById('stat-sentiment').textContent = `${pct}%`;
      }
    }

    async function fetchStats() {
      try {
        const res = await fetch('/api/stats');
        updateStats(await res.json());
      } catch (e) {}
    }

    async function viewCall(callSid) {
      try {
        const res = await fetch(`/api/calls/${callSid}`);
        const data = await res.json();

        document.getElementById('modal-title').textContent = `Call from ${data.caller_number || 'Unknown'}`;

        let html = `
          <div class="detail-grid">
            <div><strong>Status:</strong> ${data.status}</div>
            <div><strong>Duration:</strong> ${data.duration_seconds ? data.duration_seconds + 's' : 'Ongoing'}</div>
            <div><strong>Intent:</strong> ${data.caller_intent || '-'}</div>
            <div><strong>Sentiment:</strong> <span class="sentiment-${data.sentiment}">${data.sentiment || '-'}</span></div>
          </div>
        `;

        if (data.summary) {
          html += `<div class="summary-box"><strong>Summary:</strong> ${data.summary}</div>`;
        }

        if (data.messages && data.messages.length > 0) {
          html += '<div class="transcript">';
          data.messages.forEach(m => {
            const roleClass = m.role === 'user' ? 'caller' : 'assistant';
            const roleLabel = m.role === 'user' ? 'Caller' : 'AI Receptionist';
            html += `
              <div class="msg ${roleClass}">
                <div class="msg-role">${roleLabel}</div>
                ${m.content}
              </div>
            `;
          });
          html += '</div>';
        }

        document.getElementById('modal-content').innerHTML = html;
        document.getElementById('modal-overlay').classList.add('visible');
      } catch (e) {
        console.error('Failed to load call details', e);
      }
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('visible');
    }

    document.getElementById('modal-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    connectWS();
    fetchStats();
    setInterval(fetchStats, 30000);

    fetch('/api/calls')
      .then(r => r.json())
      .then(data => { calls = data; renderCalls(); })
      .catch(() => {});
  </script>
</body>
</html>
